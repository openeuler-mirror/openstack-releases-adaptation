# ============================================
# OpenStack × openEuler 自动化适配工具 配置
# ============================================

openeuler:
  lts: "24.03"
  branch: "openEuler-24.03-LTS-SP4"
  org: "src-openeuler"

openstack:
  current: "bobcat"
  base_url: "https://releases.openstack.org/"
  releases:
    - queens
    - rocky
    - train
    - stein
    - ussuri
    - victoria
    - wallaby
    - xena
    - yoga
    - zed
    - "2023.1 antelope"
    - "2023.2 bobcat"
    - "2024.1 caracal"
    - "2024.2 dalmatian"
    - "2025.1 epoxy"
    - "2025.2 flamingo"
    - "2026.1 gazpacho"
    - "2026.2 hibiscus"
  output: "openstack_release.yaml"

fetcher:
  timeout: 10000
  verify_ssl: true

inventory:
  base_url: "https://api.atomgit.com/api/v5"
  timeout: 15
  per_page: 100
  max_pages: 200
  workers: 8
  repos_file: "repos.json"
  versions_file: "Version.json"

eur:
  enabled: false
  base_url: ""
  owner: "openstack"
  prefix: "openstack:"

gitee:
  enabled: false
  bot: "openstack-bot"
  token_env: "GITEE_TOKEN"
  max_pr_per_day: 10

builder:
  docker:
    enabled: false
    image: "openeuler/openstack-builder:24.03"
    timeout: 600
