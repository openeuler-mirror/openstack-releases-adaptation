# ============================================
# OpenStack 版本适配工具配置
# ============================================
# 用于配置 release 版本列表、API 参数、输出路径等

# Release 列表（用于 openstack.py）
releases:
  - queens
  - rocky
  - train
  - stein
  - ussuri
  - victoria
  - wallaby
  - xena
  - yoga
  - zed
  - 2023.1 antelope
  - 2023.2 bobcat
  - 2024.1 caracal
  - 2024.2 dalmatian
  - 2025.1 epoxy
  - 2025.2 flamingo
  - 2026.1 gazpacho
  - 2026.2 hibiscus

# OpenStack releases 抓取配置
openstack:
  # 基础 URL
  base_url: "https://releases.openstack.org/"
  # 请求超时时间(毫秒)
  timeout: 10000
  # 是否验证 SSL 证书
  verify_ssl: true
  # 输出文件名
  output: "openstack_release.yaml"

# AtomGit 仓库配置
atomgit:
  # 组织名称
  org: "src-openeuler"
  # API 基础 URL
  base_url: "https://api.atomgit.com/api/v5"
  # 请求超时时间(秒)
  timeout: 15
  # 每页数量
  per_page: 100
  # 最大页数
  max_pages: 200
  # 并发线程数
  workers: 8
